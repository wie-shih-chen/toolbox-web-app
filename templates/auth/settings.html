{% extends "base.html" %}

{% block title %}帳號設定 - 工具箱 Web{% endblock %}

{% block content %}
<div class="container">
    <div class="settings-container">
        <div class="tool-card glass" style="padding: 30px;">
            <h2 style="margin-bottom: 25px; text-align: center;">帳號設定</h2>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="alert {{ 'alert-success' if '成功' in messages[0] else 'alert-error' }}">
                {% for message in messages %}
                <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.settings') }}">
                <div class="form-group">
                    <label>使用者名稱 (不可修改)</label>
                    <input type="text" value="{{ current_user.username }}" disabled
                        style="opacity: 0.7; cursor: not-allowed;">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="{{ current_user.email or '' }}" required
                        placeholder="綁定 Email 以便找回密碼">
                </div>

                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">

                <h3 style="font-size: 1.1rem; margin-bottom: 15px; color: var(--text-secondary);">變更密碼 (留空則不修改)</h3>

                <div class="form-group">
                    <label for="new_password">新密碼</label>
                    <input type="password" id="new_password" name="new_password" autocomplete="new-password"
                        pattern="[a-zA-Z0-9]+" title="只能包含英文字母和數字">
                </div>

                <div class="form-group">
                    <label for="confirm_password">確認新密碼</label>
                    <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password"
                        pattern="[a-zA-Z0-9]+" title="只能包含英文字母和數字">
                </div>

                <button type="submit" class="btn btn-primary btn-block">儲存變更</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
