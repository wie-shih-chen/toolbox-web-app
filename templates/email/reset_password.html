<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: sans-serif;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #ff6b6b;
            padding: 20px;
            text-align: center;
            color: white;
            border-radius: 10px 10px 0 0;
        }

        .content {
            padding: 20px;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        .code {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b6b;
            text-align: center;
            margin: 20px 0;
            letter-spacing: 5px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>密碼重設驗證</h1>
        </div>
        <div class="content">
            <p>親愛的 {{ user.username }} 您好：</p>
            <p>我們收到了您重設密碼的請求。請在重設頁面輸入以下驗證碼：</p>
            <div class="code">{{ code }}</div>
            <p>如果這不是您本人的操作，請忽略此信件。</p>
        </div>
        <div class="footer">
            <p>此信件由系統自動發送，請勿直接回信。</p>
        </div>
    </div>
</body>

</html>
