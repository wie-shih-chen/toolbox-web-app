<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #2d2d2d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .header {
            background: linear-gradient(135deg, #FFD60A 0%, #FF9F0A 100%);
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            color: #000;
            font-size: 24px;
        }

        .content {
            padding: 30px;
        }

        .message {
            font-size: 16px;
            line-height: 1.6;
            color: #d0d0d0;
            margin-bottom: 25px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #FFD60A;
        }

        .footer {
            background-color: #252525;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #404040;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>薪資報表匯出</h1>
        </div>
        <div class="content">
            <p class="message">Hi {{ username }},</p>
            <p class="message">這是您申請的薪資排班報表。CSV 檔案已隨信附上，您可以直接使用 Excel 或 Numbers 開啟。</p>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">匯出日期</div>
                    <div class="stat-value">{{ export_date }}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">資料筆數</div>
                    <div class="stat-value">{{ record_count }}</div>
                </div>
            </div>

            <p class="message" style="font-size: 14px; color: #888;">
                若您沒有提出此請求，請忽略此郵件。
            </p>
        </div>
        <div class="footer">
            &copy; 2024 工具箱 Web. All rights reserved.
        </div>
    </div>
</body>

</html>
